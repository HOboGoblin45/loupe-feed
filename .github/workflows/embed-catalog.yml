name: Embed Loupe catalog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  embed:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install open_clip_torch pillow numpy
      - name: Embed catalog
        working-directory: loupe-feed
        run: python embed_catalog.py
      - name: Refresh version stamp
        working-directory: loupe-feed
        run: python update_meta.py
      - name: Commit embeddings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loupe-feed/embeddings.json loupe-feed/catalog.meta.json
          git diff --quiet --cached || git commit -m "chore: refresh catalog image embeddings"
          git push
      - name: Purge jsDelivr cache
        continue-on-error: true
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/HOboGoblin45/loupe-feed@main/loupe-feed/embeddings.json" || true
          curl -fsS "https://purge.jsdelivr.net/gh/HOboGoblin45/loupe-feed@main/loupe-feed/catalog.meta.json" || true
